<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <title>Medidas Corporais</title>

    <link rel="stylesheet" href="css/style.css">

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="js/supabase.js"></script>
</head>

<body>

<div class="container">

    <h1>Medidas Corporais</h1>

    <form id="medidasForm">

        <input type="number" step="0.1" id="peso" placeholder="Peso (kg)" required>

        <input type="number" step="0.01" id="altura" placeholder="Altura (m)" required>

        <input type="number" step="0.1" id="cintura" placeholder="Cintura (cm)" required>

        <input type="number" step="0.1" id="braco" placeholder="Braço (cm)" required>

        <input type="number" step="0.1" id="perna" placeholder="Perna (cm)" required>

        <button type="submit">
            Salvar Medidas
        </button>

    </form>

    <hr>

    <div id="historicoMedidas"></div>

</div>

<script src="js/medidas.js"></script>

</body>
</html>
