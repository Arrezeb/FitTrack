<!DOCTYPE html>

<html lang="pt-BR">

<head>

<meta charset="UTF-8">

<title>Cadastro</title>

<link rel="stylesheet" href="css/style.css">

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<script src="js/supabase.js"></script>

</head>

<body>

<div class="container">

<h1>Cadastro</h1>

<form id="cadastroForm">

<input type="text"
       id="nome"
       placeholder="Nome"
       required>

<input type="email"
       id="email"
       placeholder="E-mail"
       required>

<input type="password"
       id="senha"
       placeholder="Senha"
       required>

<button type="submit">

Cadastrar

</button>

</form>

</div>

<script src="js/auth.js"></script>

</body>

</html>
