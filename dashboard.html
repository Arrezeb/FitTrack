<!DOCTYPE html>
<html lang="pt-BR">

<head>
<meta charset="UTF-8">
<title>FitTrack Dashboard</title>

<link rel="stylesheet" href="css/style.css">

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="js/supabase.js"></script>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css">

</head>

<body>

<div class="dashboard">

    <header class="topbar">

    <div class="logo">
        <i class="bi bi-heart-pulse-fill"></i>
        <span>FitTrack</span>
    </div>

    <h2 id="nomeUsuario">
        Carregando...
    </h2>

    <nav>

        <a href="treinos.html">
            <button>
                <i class="bi bi-barbell"></i>
                Treinos
            </button>
        </a>

        <a href="medidas.html">
            <button>
                <i class="bi bi-rulers"></i>
                Medidas
            </button>
        </a>

        <a href="metas.html">
            <button>
                <i class="bi bi-bullseye"></i>
                Metas
            </button>
        </a>

        <button onclick="logout()">
            <i class="bi bi-box-arrow-right"></i>
            Sair
        </button>
    </nav>
</header>

    <section class="cards">

        <div class="card">
            <h3>🔥 Sequência</h3>
            <span id="streak">0 dias</span>
        </div>

        <div class="card">
            <h3>🏋️ Treinos</h3>
            <span id="totalTreinos">0</span>
        </div>

        <div class="card">
            <h3>🎯 Metas</h3>
            <span id="metas">0</span>
        </div>
		
		<div class="card"> 
			<h3>✅ Concluídas</h3> 
			<span id="metasConcluidas">0</span> 
		</div>
		
		<div class="card">
			<h3>📏 Último Peso</h3>
			<span id="ultimoPeso">-- kg</span>
		</div>
		<div class="card">
			<h3>⚖️ Peso Inicial</h3>
			<span id="pesoInicial">-- kg</span>
		</div>

		<div class="card">
			<h3>📉 Diferença</h3>
			<span id="diferencaPeso">-- kg</span>
		</div>
		<div class="card">
			<h3>🏋️ Último Treino</h3>
			<span id="ultimoTreino">Nenhum treino</span>
		</div>


		
    </section>

    <section class="grafico">

        <h2>Evolução</h2>

        <canvas id="graficoPeso"></canvas>

    </section>

</div>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<script src="js/dashboard.js"></script>

</body>

</html>
