<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <title>FitTrack - Login</title>

    <link rel="stylesheet" href="css/style.css">

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

    <script src="js/supabase.js"></script>
</head>

<body>

<div class="container">

    <h1>FitTrack</h1>

    <form id="loginForm">

        <input
            type="email"
            id="email"
            placeholder="E-mail"
            required
        >

        <input
            type="password"
            id="senha"
            placeholder="Senha"
            required
        >

        <button type="submit">

            Entrar

        </button>

    </form>

    <p>

        Não possui conta?

        <a href="cadastro.html">

            Cadastre-se

        </a>

    </p>

</div>

<script src="js/auth.js"></script>

</body>
</html>
