<!DOCTYPE html>
<html lang="pt-BR">

<head>

<meta charset="UTF-8">

<title>Painel do Treinador</title>

<link rel="stylesheet" href="css/style.css">

<link rel="preconnect" href="https://fonts.googleapis.com">

<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css">

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<script src="js/supabase.js"></script>

</head>

<body>

<div class="dashboard">

<header class="topbar">

<div class="logo">

<i class="bi bi-person-workspace"></i>

<span>FitTrack Trainer</span>

</div>

<h2 id="nomeTreinador">

Carregando...

</h2>

<nav>

<button onclick="logout()">

<i class="bi bi-box-arrow-right"></i>

Sair

</button>

</nav>

</header>

<section class="cards">

<div class="card">

<h3><i class="bi bi-people"></i> Alunos</h3>

<span id="totalAlunos">0</span>

</div>

<div class="card">

<h3><i class="bi bi-bullseye"></i> Metas</h3>

<span id="totalMetasTreinador">0</span>

</div>

<div class="card">

<h3><i class="bi bi-barbell"></i> Treinos</h3>

<span id="totalTreinosTreinador">0</span>

</div>

</section>

<section class="grafico">

<h2>

<i class="bi bi-people-fill"></i>

Meus Alunos

</h2>

<div id="listaAlunos"></div>

</section>

</div>

<script src="js/dashboard_treinador.js"></script>

</body>

</html>
