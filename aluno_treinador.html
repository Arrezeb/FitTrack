<!DOCTYPE html>
<html lang="pt-BR">

<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>FitTrack - Gerenciar Aluno</title>

    <link rel="stylesheet" href="css/style.css">

    <link rel="preconnect" href="https://fonts.googleapis.com">

    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

    <link rel="stylesheet"
        href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css">

    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

    <script src="js/supabase.js"></script>

</head>

<body>

<div class="dashboard">

    <header class="topbar">

        <div class="logo">

            <i class="bi bi-person-vcard-fill"></i>

            <span>FitTrack</span>

        </div>

        <nav>

            <button onclick="voltarDashboard()">

                <i class="bi bi-arrow-left"></i>

                Voltar

            </button>

        </nav>

    </header>

    <section class="cards">

        <div class="card">

            <h3>Aluno</h3>

            <span id="nomeAluno">Carregando...</span>

        </div>

        <div class="card">

            <h3>Peso Atual</h3>

            <span id="pesoAtual">-- kg</span>

        </div>

        <div class="card">

            <h3>Altura</h3>

            <span id="alturaAluno">-- m</span>

        </div>

        <div class="card">

            <h3>IMC</h3>

            <span id="imcAluno">--</span>

        </div>

    </section>

    <section class="grafico">

        <div class="abas">

            <button class="aba ativa" onclick="abrirAba('medidas')">
                Medidas
            </button>

            <button class="aba" onclick="abrirAba('treinos')">
                Treinos
            </button>

            <button class="aba" onclick="abrirAba('metas')">
                Metas
            </button>

            <button class="aba" onclick="abrirAba('evolucao')">
                Evolução
            </button>

        </div>

        <!-- MEDIDAS -->

        <div id="medidas" class="conteudoAba">

            <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:20px;">

                <h2>Histórico de Medidas</h2>

                <button onclick="abrirModalMedida()">

                    <i class="bi bi-plus-circle"></i>

                    Nova Medida

                </button>

            </div>

            <table>

                <thead>

                    <tr>

                        <th>Data</th>

                        <th>Peso</th>

                        <th>Altura</th>

                    </tr>

                </thead>

                <tbody id="listaMedidas">

                </tbody>

            </table>

        </div>

        <!-- TREINOS -->

        <div id="treinos" class="conteudoAba" style="display:none;">

            <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:20px;">

                <h2>Treinos</h2>

                <button onclick="abrirModalTreino()">

                    <i class="bi bi-plus-circle"></i>

                    Novo Treino

                </button>

            </div>

            <div id="listaTreinos"></div>

        </div>

        <!-- METAS -->

        <div id="metas" class="conteudoAba" style="display:none;">

            <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:20px;">

                <h2>Metas</h2>

                <button onclick="abrirModalMeta()">

                    <i class="bi bi-plus-circle"></i>

                    Nova Meta

                </button>

            </div>

            <div id="listaMetas"></div>

        </div>

        <!-- EVOLUÇÃO -->

        <div id="evolucao" class="conteudoAba" style="display:none;">

            <h2>Evolução do Peso</h2>

            <canvas id="graficoPeso"></canvas>

        </div>

    </section>

</div>

<!-- Modal Medida -->

<div id="modalMedida" class="modal">

    <div class="modal-content">

        <h2>Nova Medida</h2>

        <input type="number" id="peso" placeholder="Peso">

        <input type="number" step="0.01" id="altura" placeholder="Altura">

        <br><br>

        <button onclick="salvarMedida()">

            Salvar

        </button>

        <button onclick="fecharModal('modalMedida')">

            Cancelar

        </button>

    </div>

</div>

<!-- Modal Treino -->

<div id="modalTreino" class="modal">

    <div class="modal-content">

        <h2>Novo Treino</h2>

        <input type="text" id="nomeTreino" placeholder="Nome do treino">

        <textarea id="descricaoTreino" placeholder="Descrição"></textarea>

        <br><br>

        <button onclick="salvarTreino()">

            Salvar

        </button>

        <button onclick="fecharModal('modalTreino')">

            Cancelar

        </button>

    </div>

</div>

<!-- Modal Meta -->

<div id="modalMeta" class="modal">

    <div class="modal-content">

        <h2>Nova Meta</h2>

        <input type="text" id="descricaoMeta" placeholder="Descrição da meta">

        <br><br>

        <button onclick="salvarMeta()">

            Salvar

        </button>

        <button onclick="fecharModal('modalMeta')">

            Cancelar

        </button>

    </div>

</div>

<script src="js/aluno_treinador.js"></script>

</body>
</html>
